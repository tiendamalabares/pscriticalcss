name: Build ZIP

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Instalar dependencias composer
        run: composer install --no-dev -o

      - name: Parchear autoload.php para evitar duplicidades de clases
        run: |
          php -r "
          \$file = 'vendor/autoload.php';
          \$content = file_get_contents(\$file);
          preg_match('/ComposerAutoloaderInit[a-f0-9]+/', \$content, \$matches);
          \$class = \$matches[0];
          \$content = str_replace(
              \"require_once __DIR__ . '/composer/autoload_real.php';\",
              \"if (!class_exists('\$class', false)) {\\n    require_once __DIR__ . '/composer/autoload_real.php';\\n}\",
              \$content
          );
          file_put_contents(\$file, \$content);
          "

      - name: Extraer versión del módulo
        id: get_version
        run: |
          VERSION=$(grep -oP '\$this->version\s*=\s*\047\K[^\047]*(?=\047)' pscriticalcss.php | head -1)
          [ -z "$VERSION" ] && VERSION=$(grep -oP '\$this->version\s*=\s*"\K[^"]*(?=")' pscriticalcss.php | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "{\"version\":\"$VERSION\"}" > version.json
          echo "{\"version\":\"$VERSION\"}" > ../version.json

      - name: Crear ZIP con carpeta raíz correcta
        run: |
          cd ..
          zip -r pscriticalcss.zip pscriticalcss/ \
            --exclude "pscriticalcss/.git/*" \
            --exclude "pscriticalcss/.github/*" \
            --exclude "pscriticalcss/.gitignore" \
            --exclude "pscriticalcss/.ddev/*" \
            --exclude "pscriticalcss/tests/*" \
            --exclude "pscriticalcss/.php-cs-fixer*" \
            --exclude "pscriticalcss/.editorconfig" \
            --exclude "pscriticalcss/docker-compose.yml" \
            --exclude "pscriticalcss/Makefile"

      - name: Publicar ZIP en Release "latest"
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: latest
          name: "v${{ steps.get_version.outputs.version }}"
          prerelease: true
          files: |
            ../pscriticalcss.zip
            ../version.json
