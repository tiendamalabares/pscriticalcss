name: Build ZIP

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extraer versión del módulo
        id: get_version
        run: |
          VERSION=$(grep -oP '\$this->version\s*=\s*\047\K[^\047]*(?=\047)' pscriticalcss.php | head -1)
          [ -z "$VERSION" ] && VERSION=$(grep -oP '\$this->version\s*=\s*"\K[^"]*(?=")' pscriticalcss.php | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "{\"version\":\"$VERSION\"}" > version.json
          echo "{\"version\":\"$VERSION\"}" > ../version.json

      - name: Crear ZIP con carpeta raíz correcta
        run: |
          cd ..
          zip -r pscriticalcss.zip pscriticalcss/ \
            --exclude "pscriticalcss/.git/*" \
            --exclude "pscriticalcss/.github/*" \
            --exclude "pscriticalcss/.gitignore" \
            --exclude "pscriticalcss/tests/*" \
            --exclude "pscriticalcss/playwright.config.js" \
            --exclude "pscriticalcss/package*.json"

      - name: Publicar ZIP en Release \"latest\"
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: latest
          name: "v${{ steps.get_version.outputs.version }}"
          prerelease: true
          files: |
            ../pscriticalcss.zip
            ../version.json
